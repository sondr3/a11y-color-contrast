pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      stage_fixed: true
      glob: "**/*.{config.ts,ts,json,yml,yaml,md}"
      run: pnpm format --no-error-on-unmatched-pattern {staged_files}
    - name: oxlint
      stage_fixed: true
      glob: "**/*.{ts,js}"
      run: pnpm lint:fix --no-error-on-unmatched-pattern {staged_files}
