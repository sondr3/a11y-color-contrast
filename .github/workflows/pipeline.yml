name: pipeline

on: [push, pull_request]

jobs:
  pipeline:
    name: pipeline
    strategy:
      matrix:
        node: ["latest", "lts/*"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install and build
        run: pnpm install --frozen-lockfile

      - name: Check
        run: |
          pnpm format
          pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
